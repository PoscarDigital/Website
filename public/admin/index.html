<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POSCAR Digital - Content Manager</title>
    <link href="/poscar-logo.png" rel="icon" type="image/png" />
  </head>
  <body>
    <!-- Include the Decap CMS script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <!-- Initialize the CMS -->
    <script>
      window.CMS_MANUAL_INIT = true;
      
      // Initialize CMS
      window.addEventListener('load', () => {
        CMS.init({
          config: {
            backend: {
              name: 'test-repo' // Use test-repo backend for local development without authentication
            },
            local_backend: true,
            load_config_file: true,
            media_folder: 'public/images/uploads',
            public_folder: '/images/uploads',
            collections: [
              {
                name: 'blog',
                label: 'Blog Posts',
                folder: 'src/content/blog',
                create: true,
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Publish Date', name: 'date', widget: 'datetime' },
                  { label: 'Body', name: 'body', widget: 'markdown' }
                ]
              }
            ]
          }
        });
      });
    </script>
  </body>
</html>
