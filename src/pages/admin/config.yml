backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: '[skip ci] Upload "{{path}}"'
    deleteMedia: '[skip ci] Delete "{{path}}"'

# Local backend for development
local_backend: true

# Media folders
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Collections
collections:
  # Blog posts in English
  - name: "blog-en"
    label: "Blog Posts (English)"
    folder: "src/content/blog/en"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Language", name: "lang", widget: "hidden", default: "en" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Featured Image", name: "thumbnail", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["News", "Technology", "Education", "Business"] }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Body", name: "body", widget: "markdown" }

  # Blog posts in Khmer
  - name: "blog-km"
    label: "Blog Posts (ខ្មែរ)"
    folder: "src/content/blog/km"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Language", name: "lang", widget: "hidden", default: "km" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "blog" }
      - { label: "ចំណងជើង", name: "title", widget: "string" }
      - { label: "កាលបរិច្ឆេទ", name: "date", widget: "datetime" }
      - { label: "អ្នកនិពន្ធ", name: "author", widget: "string" }
      - { label: "រូបភាព", name: "thumbnail", widget: "image" }
      - { label: "ការពិពណ៌នា", name: "description", widget: "text" }
      - { label: "ប្រភេទ", name: "category", widget: "select", options: ["ព័ត៌មាន", "បច្ចេកវិទ្យា", "ការអប់រំ", "ពាណិជ្ជកម្ម"] }
      - { label: "ស្លាក", name: "tags", widget: "list" }
      - { label: "មាតិកា", name: "body", widget: "markdown" }
